name: Deploy Site

on:
  workflow_run:
    workflows: ["Thinker Tracker", "Trend Tracker", "Feature Tracker", "DeepDive"]
    types: [completed]
  workflow_dispatch:

# 需在 Settings → Pages → Source 选 "GitHub Actions"（私有仓库需 Pro；或改用 Vercel）
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e .
      - name: Build site
        env:
          BUTTONDOWN_USERNAME: ${{ vars.BUTTONDOWN_USERNAME }}
          RADAR_SITE_TITLE: ${{ vars.RADAR_SITE_TITLE }}
          RADAR_BASE_PATH: /${{ github.event.repository.name }}
        run: python site/build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - id: deploy
        uses: actions/deploy-pages@v4
