name: Trend Tracker

on:
  schedule:
    - cron: "15 2 * * 1,3,5"   # 每周一三五 10:15 北京（UTC 02:15）
  workflow_dispatch:

concurrency:
  group: info-radar-commit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e .
      - name: Run trend
        env:
          YUYU_API_KEY: ${{ secrets.YUYU_API_KEY }}
          YUYU_BASE_URL: ${{ secrets.YUYU_BASE_URL }}
          LIAOBOTS_API_KEY: ${{ secrets.LIAOBOTS_API_KEY }}
          LIAOBOTS_BASE_URL: ${{ secrets.LIAOBOTS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          RADAR_SITE_BASE: ${{ vars.RADAR_SITE_BASE }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run.py trend
      - name: Commit state & digest
        run: |
          git config user.name "info-radar-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ output/ || true
          git commit -m "chore(trend): update state & digest [skip ci]" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push
